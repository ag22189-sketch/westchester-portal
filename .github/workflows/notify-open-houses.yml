name: Open House Notifier

on:
  schedule:
    - cron: '0 12 * * 3'  # Wednesday 12:00 UTC = 7 AM ET (digest)
    - cron: '30 * * * *'  # Every hour at :30 (monitor)
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode: digest or monitor'
        required: false
        default: 'digest'

permissions:
  contents: write

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode || 'digest' }}" >> $GITHUB_OUTPUT
          elif [ "$(date -u +%H)" = "12" ] && [ "$(date -u +%u)" = "3" ]; then
            echo "mode=digest" >> $GITHUB_OUTPUT
          else
            echo "mode=monitor" >> $GITHUB_OUTPUT
          fi

      - name: Run open house notifier
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAIL_TO: ${{ secrets.NOTIFY_EMAIL_TO }}
        run: node scripts/notify-open-houses.js ${{ steps.mode.outputs.mode }}

      - name: Commit seen-open-houses.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/seen-open-houses.json
          git diff --cached --quiet || git commit -m "Update seen-open-houses.json [skip ci]"
          git push
